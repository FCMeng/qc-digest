name: Research Digest

on:
  schedule:
    - cron: "0 9 * * 1,3,5"
    - cron: "0 10 * * 1,3,5"
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Eastern schedule
        id: eastern_schedule
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule || '' }}
        run: |
          if [ "$EVENT_NAME" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          expected_cron=$(python -c 'from datetime import datetime; from zoneinfo import ZoneInfo; eastern = datetime.now(ZoneInfo("America/New_York")).replace(hour=5, minute=0, second=0, microsecond=0); print("0 {} * * 1,3,5".format(eastern.astimezone(ZoneInfo("UTC")).hour))')
          echo "Triggered by schedule: $EVENT_SCHEDULE"
          echo "Expected 5 AM Eastern schedule today: $expected_cron"
          if [ "$EVENT_SCHEDULE" = "$expected_cron" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.eastern_schedule.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.eastern_schedule.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Delete existing workflow runs
        if: steps.eastern_schedule.outputs.should_run == 'true' && vars.RESET_PUBLISHED_ARCHIVE == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/delete_workflow_runs.py

      - name: Restore published archive
        if: steps.eastern_schedule.outputs.should_run == 'true'
        env:
          RESET_PUBLISHED_ARCHIVE: ${{ vars.RESET_PUBLISHED_ARCHIVE || 'false' }}
        run: python scripts/restore_pages_archive.py

      - name: Build digest
        if: steps.eastern_schedule.outputs.should_run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-mini' }}
          DIGEST_INTERVAL_DAYS: "3"
          SKIP_EMAIL: "true"
        run: python src/run_digest.py

      - name: Configure Pages
        if: steps.eastern_schedule.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.eastern_schedule.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.eastern_schedule.outputs.should_run == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send email
        if: steps.eastern_schedule.outputs.should_run == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: python src/email_digest.py
